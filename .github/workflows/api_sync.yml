name: IPTV Multi-Source Sync (Target Private Repo)

on:
  schedule:
    # 每 6 小时触发一次
    - cron: '10 */6 * * *'
  workflow_dispatch:

jobs:
  sync_all:
    runs-on: ubuntu-latest

    steps:
      - name: 检出当前公共库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装基础依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: 🔐 初始化私库运行空间
        env:
          LIVE_TOKEN: ${{ secrets.LIVE_TOKEN }}
        run: |
          # 1. 配置临时 Git 机器人身份（防中文乱码）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false

          # 2. 将目标私库直接克隆到本地的 'repo_live' 文件夹中
          git clone https://${{ secrets.LIVE_TOKEN }}@github.com/hohao234/lives.git repo_live

      - name: 📡 运行 Hotel 抓取并将结果写入私库
        run: |
          echo "📥 正在运行 Hotel 抓取同步..."
          python py/hotel_sync.py

      - name: 📡 运行 Zubo 抓取并将结果写入私库
        run: |
          echo "📥 正在运行 Zubo 抓取同步..."
          python py/zubo_sync.py

      - name: 🚀 检查私库变更并安全推回
        env:
          LIVE_TOKEN: ${{ secrets.LIVE_TOKEN }}
        run: |
          cd repo_live
          
          # 将 hotel/ 和 zubo/ 目录的新增、修改、删除全部加入暂存区
          git add hotel/ zubo/
          
          if git diff --staged --quiet; then
            echo "ℹ️ 私库内容无任何变动，跳过推送。"
          else
            # 🚨 已安全移除 [skip ci]，确保私库收到最新源后能自动刷新 Pages
            git commit -m "📊 组播与酒店源多源自动化同步"
            # 安全地用常规 push 增量同步回私库，不带 --force，不会覆盖你的其他生存测速等文件
            git push https://${{ secrets.LIVE_TOKEN }}@github.com/hohao234/lives.git main
          fi
